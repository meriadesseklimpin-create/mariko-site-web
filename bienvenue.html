<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #003366, #0055a5);
            font-family: Arial, sans-serif;
        }
        
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 30px;
            padding: 0 20px;
        }
        
        .logo {
            height: 80%;
            display: flex;
            align-items: center;
        }
        
        .logo img {
            max-height: 100%;
            max-width: 120px;
            object-fit: contain;
        }
        
        .message {
            color: white;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 2px;
            flex: 1;
        }
        
        .message small {
            display: block;
            font-size: 16px;
            font-weight: normal;
            margin-top: 5px;
            opacity: 0.9;
        }
        
        /* Si vous n'avez pas d'images, utilisez des textes stylisés */
        .logo-text {
            background: white;
            color: #003366;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="header-container">
        <!-- Logo gauche -->
        <div class="logo">
            <!-- Option 1: Avec image -->
            <img src="maka.jpg" alt="Logo UAC">
            
            <!-- Option 2: Sans image (texte stylisé) -->
            <!-- <div class="logo-text">UAC</div> -->
        </div>
        
        <!-- Message central -->
        <div class="message">
            BIENVENU DANS MON SITE
            <small>École Nationale d'Économie Appliquée et de Management</small>
        </div>
        
        <!-- Logo droite -->
        <div class="logo">
            <!-- Option 1: Avec image -->
            <img src="miko.jpg" alt="Logo ENEAM">
            
            <!-- Option 2: Sans image (texte stylisé) -->
            <!-- <div class="logo-text">ENEAM</div> -->
        </div>
    </div>
</body>
</html>
